<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Cuadro radial</title>
<style>
  :root{
    --paper:#F2ECE0;       /* fondo papel cálido (como la imagen de referencia) */
    --ink:#1A1A1A;         /* trazo principal */
    --line:#2A2A2A;        /* ramas del bracket */
    --dim:#BDB6A8;         /* eliminado / atenuado */
    --gold:#C8A24B;        /* acento único: campeón / trofeo */
    --bg-flag:#D6D0C4;     /* respaldo si una bandera no carga */
    --muted:#8a8478;       /* textos secundarios */
    --faint:#b6af9f;       /* etiquetas de ronda */
    --flaglab:#5a5448;     /* código de país (fallback) */
    --slotline:#b9b2a4;    /* huecos punteados */
    --hairline:#d8d2c5;    /* separadores */
    --pill-dim-bg:#cfc9bd; --pill-dim-fg:#544f44; --pill-dim-bd:#a7a092;
  }
  body.dark{
    --paper:#17150F;
    --ink:#EDE6D6;
    --line:#D8D1BF;
    --dim:#57523F;
    --bg-flag:#2C2921;
    --muted:#9a927c;
    --faint:#5f594a;
    --flaglab:#b8b09a;
    --slotline:#7a725c;
    --hairline:#3a362c;
    --pill-dim-bg:#3a362c; --pill-dim-fg:#b6ae99; --pill-dim-bd:#565040;
  }
  body.dark .slot{stroke-width:1.7}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  *{-webkit-tap-highlight-color:transparent}
  svg, header, footer, .info{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
  body{
    background:var(--paper);
    transition:background .3s;
    color:var(--ink);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;
    overflow:hidden;
  }
  header{
    text-align:center;
    padding:18px 16px 6px;
  }
  h1{
    margin:0;
    font-size:clamp(20px,3.4vw,30px);
    font-weight:800;
    letter-spacing:-0.01em;
  }
  .sub{
    margin:4px 0 0;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:600;
  }
  .controls{
    display:flex;gap:10px;align-items:center;justify-content:center;
    flex-wrap:wrap;margin:10px 0 2px;
  }
  button{
    font:inherit;font-size:12px;font-weight:600;
    letter-spacing:0.02em;
    padding:8px 14px;border-radius:999px;
    border:1.5px solid var(--ink);
    background:transparent;color:var(--ink);
    cursor:pointer;transition:background .15s,color .15s;
  }
  button:hover{background:var(--ink);color:var(--paper)}
  button:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .hint{
    font-size:11px;color:var(--muted);letter-spacing:0.02em;
  }
  .stage-wrap{
    flex:1;width:100%;display:flex;align-items:center;justify-content:center;
    min-height:0;
  }
  svg{width:100%;height:100%;display:block;touch-action:none;cursor:grab}
  svg.dragging{cursor:grabbing}
  .anim{transition:transform 1.5s cubic-bezier(.33,0,.18,1)}
  .reduced .anim{transition:none}
  .flaglabel{fill:var(--flaglab);font-weight:700;font-family:inherit;user-select:none}
  .node.dim{opacity:1}
  .node.dim image{filter:url(#f-dim)}
  body.dark .node.dim image{filter:url(#f-dim-dark)}
  .node.dim .ring{stroke:var(--slotline)}
  .node.dim .flaglabel{opacity:.5}
  .branch{stroke:var(--line);stroke-width:1.3;opacity:.4;fill:none;stroke-linejoin:round;stroke-linecap:round}
  .routeseg{fill:none;stroke:var(--gold);stroke-width:3.4;opacity:.55;stroke-dasharray:5 7;stroke-linejoin:round;stroke-linecap:round}
  .routeseg.gone{stroke-dasharray:none;opacity:.95}
  .node.fade{opacity:1}
  .node.fade image{filter:url(#f-fade)}
  body.dark .node.fade image{filter:url(#f-fade-dark)}
  .node.fade .ring{stroke:var(--slotline)}
  .node.fade .flaglabel{opacity:.3}
  .ringlabel{font-size:12.5px;letter-spacing:.4em;font-weight:700;fill:var(--faint)}
  .node.sim .ring{stroke-dasharray:5 4;opacity:.85}
  .node.pred{opacity:.92}
  .node.pred .ring{stroke:var(--gold);stroke-width:2.4;stroke-dasharray:5 4}
  .ghost{opacity:.75;pointer-events:none}
  .slot.target{stroke:var(--gold);stroke-width:3;stroke-dasharray:none}
  .p3label{font-size:11px;letter-spacing:.3em;font-weight:800;fill:var(--faint)}
  .p3vs{font-size:11px;font-weight:700;fill:var(--muted)}
  .p3info{font-size:10.5px;fill:var(--muted)}
  .p3score{font-size:16px;font-weight:800;fill:var(--ink)}
  .slot{fill:var(--paper);stroke:var(--slotline);stroke-width:1.4;stroke-dasharray:3 4}
  .slot.champ{stroke:var(--gold);stroke-width:2.2;stroke-dasharray:none}
  .champ-glyph{font-size:46px;text-anchor:middle;dominant-baseline:central}
  .info{
    position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);
    padding:9px 16px;border-radius:999px;font-size:13px;font-weight:600;
    letter-spacing:0.01em;opacity:0;transition:opacity .2s;pointer-events:none;
    max-width:90vw;text-align:center;
  }
  .info.show{opacity:1}
  .card{
    position:fixed;left:50%;bottom:0;transform:translate(-50%,115%);
    width:min(430px,94vw);background:var(--paper);
    border:1.5px solid var(--ink);border-bottom:none;border-radius:18px 18px 0 0;
    padding:16px 18px 22px;box-shadow:0 -10px 34px rgba(0,0,0,.14);max-height:82vh;overflow-y:auto;
    transition:transform .4s cubic-bezier(.33,0,.18,1);z-index:10;
  }
  .card.show{transform:translate(-50%,0)}
  /* scroll de la card a juego con el diseño */
  .card{scrollbar-width:thin;scrollbar-color:var(--slotline) transparent}
  .card::-webkit-scrollbar{width:8px}
  .card::-webkit-scrollbar-track{background:transparent;margin:14px 0}
  .card::-webkit-scrollbar-thumb{background:var(--slotline);border-radius:999px;border:2px solid var(--paper)}
  .card::-webkit-scrollbar-thumb:hover{background:var(--muted)}
  .rhead{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:13px 0 5px;border-bottom:1px solid var(--hairline);padding-bottom:3px}
  .rrow{display:flex;align-items:center;gap:6px;font-size:12.5px;padding:3px 0}
  .rrow .rteam{flex:1;display:flex;align-items:center;gap:5px;font-weight:700;min-width:0}
  .rrow .rt2{justify-content:flex-end}
  .rrow .rscore{min-width:34px;text-align:center;font-weight:800}
  .rf{width:17px;height:17px;border-radius:50%;border:1px solid var(--ink);flex:none}
  .rnote{font-size:10.5px;color:var(--muted);text-align:center;margin-top:-1px;padding-bottom:2px}
  .ppill.mini{font-size:9.5px;padding:2px 7px;margin-left:2px;flex:none}
  .rtotal{margin-top:14px;font-size:12.5px;border-top:1px solid var(--hairline);padding-top:9px;text-align:center}
  @media (max-width:899px){
    .card{max-height:44vh}
  }
  @media (min-width:900px){
    .card{
      left:auto;right:18px;bottom:18px;
      width:340px;max-height:72vh;
      transform:translate(0,calc(100% + 40px));
      border-bottom:1.5px solid var(--ink);border-radius:16px;
      box-shadow:0 12px 34px rgba(0,0,0,.16);
    }
    .card.show{transform:translate(0,0)}
  }
  .card .top{display:flex;align-items:center;gap:12px}
  .card .cf{width:46px;height:46px;border-radius:50%;border:1.5px solid var(--ink);background:var(--bg-flag)}
  .card .nm{font-size:18px;font-weight:800;line-height:1.1}
  .card .meta{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:3px}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:13px}
  .pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;border:1.4px solid var(--ink)}
  .pill.lvl-A{background:var(--gold);border-color:var(--gold);color:#3a2e10}
  .pill.lvl-B{background:#2f6b4f;border-color:#2f6b4f;color:#fff}
  .pill.lvl-D,.pill.lvl-E{background:var(--pill-dim-bg);border-color:var(--pill-dim-bd);color:var(--pill-dim-fg)}
  .row{font-size:13px;margin-top:11px;line-height:1.45}
  .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .stats{margin-top:11px;border-top:1px solid var(--hairline);padding-top:6px}
  .srow{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:3px 0}
  .srow .sl{color:var(--muted);font-size:11px;flex:1;text-align:center}
  .srow span:first-child,.srow span:last-child{font-weight:700;min-width:46px}
  .srow span:first-child{text-align:left}
  .srow span:last-child{text-align:right}
  .srow.shead span{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .ppill{font-size:10.5px;font-weight:800;padding:2px 9px;border-radius:999px;margin-left:6px;vertical-align:1px}
  .ppill.p6{background:#2f6b4f;color:#fff}
  .ppill.p4{background:#2c5d8f;color:#fff}
  .ppill.p3{background:var(--gold);color:#3a2e10}
  .ppill.p0{background:#b0483f;color:#fff}
  .close{position:absolute;top:9px;right:11px;border:none;background:none;font-size:18px;color:var(--muted);padding:5px;cursor:pointer}
  .close:hover{background:none;color:var(--ink)}
  footer{font-size:10.5px;color:var(--muted);padding:6px 12px 10px;text-align:center;letter-spacing:0.04em}
  .node{cursor:pointer}
</style>
</head>

  <header>
    <h1>World Cup 2026</h1>
    <p class="sub">Cuadro radial · Dieciseisavos → Campeón</p>
    <div class="controls">
      <button id="play">▶ Simular hasta el campeón</button>
      <button id="reset" style="display:none">↺ Estado real</button>
      <button id="clearpred" style="display:none">✕ Limpiar predicciones</button>
      <button id="results">📋 Resultados</button>
      <button id="theme">🌙 Oscuro</button>
      <span class="hint">Gira arrastrando el fondo · arrastra una bandera al siguiente nodo para predecir</span>
    </div>
  </header>

  <div class="stage-wrap">
    <svg id="svg" viewBox="0 0 1000 1000" role="img" aria-label="Cuadro de eliminatorias del Mundial 2026">

        <filter id="f-fade"><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncR type="linear" slope="0.406" intercept="0.522"/><feFuncG type="linear" slope="0.406" intercept="0.522"/><feFuncB type="linear" slope="0.406" intercept="0.522"/></feComponentTransfer></filter>
        <filter id="f-dim-dark"><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncR type="linear" slope="0.375" intercept="0.1875"/><feFuncG type="linear" slope="0.375" intercept="0.1875"/><feFuncB type="linear" slope="0.375" intercept="0.1875"/></feComponentTransfer></filter>
        <filter id="f-fade-dark"><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncR type="linear" slope="0.22" intercept="0.10"/><feFuncG type="linear" slope="0.22" intercept="0.10"/><feFuncB type="linear" slope="0.22" intercept="0.10"/></feComponentTransfer></filter>
      </defs>
      <g id="stage">
        <g id="ringlabels"></g>
        <g id="lines"></g>
        <g id="slots"></g>
        <g id="route"></g>
        <g id="flags"></g>
        <g id="preds"></g>
        <g id="champ"></g>
      </g>
      <g id="third"></g>
    </svg>
  </div>

  <div class="info" id="info"></div>
  <div class="card" id="card"></div>
  <footer>Datos base fijos (fuente de verdad) · diseño original · banderas: circle-flags (MIT)</footer>

const GROUPWINS = {"jp":1,"ci":2,"no":2,"mx":3,"ec":1,"gb-eng":2,"cd":1,"ar":3,"cv":0,"au":1,"eg":1,"ch":2,"dz":1,"co":2,"gh":1,"sn":1,"be":1,"ba":1,"us":2,"at":1,"es":2,"pt":1,"hr":2,"ma":2,"nl":2,"ca":1,"za":1,"se":1,"fr":3,"py":1,"de":2,"br":2};

// ---- GEOMETRÍA POLAR ----
const CX=500, CY=500, N=32;
const RADII=[440,350,262,178,98,0];        // anillos 0..5 (5 = campeón, centro)
const DIAM =[44,50,58,64,70,96];           // diámetro por anillo: CRECE hacia el título (crescendo)
const RINGS=6;

// Calcula ángulo (grados, 0=arriba) de cada posición en cada anillo.
// El anillo exterior arranca con MEDIO paso de offset: así la cascada de promedios
// queda centrada (semis en 45/135/225/315 y final horizontal, sin inclinación).
const pos = [];
pos[0] = TEAMS.map((_,i)=>({ang: (i+0.5)*360/N}));
for(let r=1;r<RINGS;r++){
  const count = N/Math.pow(2,r);
  pos[r] = [];
  for(let m=0;m<count;m++){
    pos[r][m] = {ang:(pos[r-1][2*m].ang + pos[r-1][2*m+1].ang)/2};
  }
}
// Convierte a coordenadas x,y
for(let r=0;r<RINGS;r++) pos[r].forEach(p=>{
  const a=(p.ang-90)*Math.PI/180;
  p.x=CX+RADII[r]*Math.cos(a);
  p.y=CY+RADII[r]*Math.sin(a);
});

// ---- ESTADO ----  positions[r][m] = indice de equipo | null
let state;
function freshState(){
  const s=[];
  s[0]=TEAMS.map((_,i)=>i);
  for(let r=1;r<RINGS;r++) s[r]=new Array(N/Math.pow(2,r)).fill(null);
  return s;
}

// ---- DIBUJAR RAMAS (estilo codo: tramo radial recto + giro al nodo) ----
function polar(angDeg, radius){
  const a=(angDeg-90)*Math.PI/180;
  return {x:CX+radius*Math.cos(a), y:CY+radius*Math.sin(a)};
}
function elbowPath(child, foot, parent, k=18){
  // codo con esquina redondeada (filete cuadrático en el giro)
  const d1=Math.hypot(foot.x-child.x,foot.y-child.y);
  const d2=Math.hypot(parent.x-foot.x,parent.y-foot.y);
  if(d1<0.5||d2<0.5) return `M ${child.x} ${child.y} L ${parent.x} ${parent.y}`;
  const t1=Math.min(k,d1/2), t2=Math.min(k,d2/2);
  const p1x=foot.x+(child.x-foot.x)*t1/d1, p1y=foot.y+(child.y-foot.y)*t1/d1;
  const p2x=foot.x+(parent.x-foot.x)*t2/d2, p2y=foot.y+(parent.y-foot.y)*t2/d2;
  return `M ${child.x} ${child.y} L ${p1x.toFixed(1)} ${p1y.toFixed(1)} Q ${foot.x} ${foot.y} ${p2x.toFixed(1)} ${p2y.toFixed(1)} L ${parent.x} ${parent.y}`;
}
function drawLines(){
  $lines.innerHTML="";
  for(let r=1;r<RINGS;r++){
    pos[r].forEach((p,m)=>{
      [pos[r-1][2*m], pos[r-1][2*m+1]].forEach(child=>{
        const foot=polar(child.ang, RADII[r]);
        el("path",{d:elbowPath(child,foot,p),class:"branch"},$lines);
      });
    });
  }
}

function drawSlots(){
  $slots.innerHTML="";
  slotEls=[];

// ---- CALCULAR CAMINO AL TÍTULO ----
function koRecord(teamIdx){
  const code=TEAMS[teamIdx][0];
  let w=0, pen=0;
  for(const key in MATCHES){
    const md=MATCHES[key];
    const [r,m]=key.split("-").map(Number);
    if(!state[r]) continue;
    const a=state[r][2*m], b=state[r][2*m+1];
    if(a!==teamIdx && b!==teamIdx) continue;
    const isA=(a===teamIdx);
    const [ga,gb]=md.score;
    const mine=isA?ga:gb, theirs=isA?gb:ga;
    if(mine>theirs) w++;
    else if(mine===theirs && md.adv===code) pen++;   // avanzó por penales: no es victoria
  }
  return {w,pen};
}
function getProgress(teamIdx){
  const names=["Dieciseisavos","Octavos","Cuartos","Semis","Final","Campeón"];
  let deepest=0;
  for(let r=0;r<RINGS;r++) if(state[r].includes(teamIdx)) deepest=r;
  const wins=deepest;
  let eliminated=false, elimRound=null;
  if(deepest<RINGS-1){
    const idx=state[deepest].indexOf(teamIdx);
    const nxt=state[deepest+1][Math.floor(idx/2)];
    if(nxt!=null && nxt!==teamIdx){eliminated=true; elimRound=names[deepest];}
  }
  if(deepest===RINGS-1) return `🏆 Campeón`;
  if(eliminated && elimRound==="Final") return `🥈 Subcampeón del Mundial`;
  const tp3=MATCHES["3P"];
  if(eliminated && elimRound==="Semis" && tp3 && CODE2IDX[tp3.adv]===teamIdx) return `🥉 3er lugar del Mundial`;
  if(eliminated)        return `Eliminado en ${elimRound}`;
  return `En ${names[deepest]} · a ${5-deepest} ronda${5-deepest===1?"":"s"} del título`;
}

function matchOf(teamIdx){
  for(let r=RINGS-2;r>=0;r--){
    const idx=state[r].indexOf(teamIdx);
    if(idx<0) continue;
    const m=Math.floor(idx/2);
    const md=MATCHES[`${r}-${m}`];
    if(md) return {r,m,md, a:state[r][2*m], b:state[r][2*m+1]};
  }

}
const STAT_DEFS=[["Posesión","posesion","%"],["Remates","remates",""],["Remates al arco","rematesArco",""],
  ["Pases","pases",""],["Precisión pases","precision","%"],["Faltas","faltas",""],["Córners","corners",""],["Amarillas","amarillas",""]];
function pickPillHTML(md){

function matchHTML(teamIdx){
  const tp=MATCHES["3P"], tl=semiLosers();
  if(tp && tl && (tl[0]===teamIdx || tl[1]===teamIdx)){
    let head=`${TEAMS[tl[0]][2]} ${tp.score[0]}–${tp.score[1]} ${TEAMS[tl[1]][2]}`;
    if(tp.aet) head+=" · definido en el alargue";
    return `<div class="row"><span class="k">Partido (3er puesto) 🥉</span><br>${head}</div>`+pickPillHTML(tp);
  }
  const mm=matchOf(teamIdx);
  if(!mm) return "";
  const na=TEAMS[mm.a][2], nb=TEAMS[mm.b][2];
  const [ga,gb]=mm.md.score;
  const RNAMES=["Dieciseisavos","Octavos","Cuartos","Semis","Final"];
  let head=`${na} ${ga}–${gb} ${nb}`;
  if(mm.md.pen) head += ` · ${TEAMS[CODE2IDX[mm.md.adv]][2]} por penales`;
  if(mm.md.aet) head += ` · definido en el alargue`;
  let html=`<div class="row"><span class="k">Partido (${RNAMES[mm.r]})</span><br>${head}</div>`;
  html+=pickPillHTML(mm.md);
  if(mm.md.stats){
    const s=mm.md.stats;
    const rows=STAT_DEFS.filter(d=>s[d[1]]).map(d=>{
      const [va,vb]=s[d[1]];
      return `<div class="srow"><span>${va}${d[2]}</span><span class="sl">${d[0]}</span><span>${vb}${d[2]}</span></div>`;
    }).join("");
    html+=`<div class="stats"><div class="srow shead"><span>${TEAMS[mm.a][1]}</span><span class="sl">Estadísticas</span><span>${TEAMS[mm.b][1]}</span></div>${rows}</div>`;
  }
  return html;
}

// ---- 3ER PUESTO (perdedores de semis) ----
let simThird=null, simScores={};   // 🥉 y marcadores simulados (transitorios, jamás tocan MATCHES)
function semiLosers(){
  // perdedores derivados del estado EFECTIVO: sirve con semis reales, simuladas o PREDICHAS
  const out=[]; let anyPred=false;
  for(let m=0;m<2;m++){
    const A=effAt(3,2*m), B=effAt(3,2*m+1), W=effAt(4,m);
    if(!A||!B||!W) return null;
    anyPred = anyPred || A.pred || B.pred || W.pred;
    out.push(W.idx===A.idx ? B.idx : A.idx);
  }
  out.pred=anyPred;
  return out;
}
let bdrag=null, bronzeSlotEl=null;
function svgPointFixed(ev){
  const r=$svg.getBoundingClientRect();
  return {x:(ev.clientX-r.left)/r.width*1000, y:(ev.clientY-r.top)/r.height*1000};
}
function bronzePointerDown(ev,teamIdx,homeX,homeY){
  ev.stopPropagation();
  moved=false;
  bdrag={teamIdx,homeX,homeY,started:false,ghost:null};
}
function bronzeMove(ev){
  const p=svgPointFixed(ev);
  if(!bdrag.started){
    if(Math.hypot(p.x-bdrag.homeX, p.y-bdrag.homeY) < 8) return;
    bdrag.started=true; moved=true;
    try{ $svg.setPointerCapture(ev.pointerId); }catch(e){}
    bdrag.ghost=makeGhost(bdrag.teamIdx,40,$third);
    if(bronzeSlotEl) bronzeSlotEl.classList.add("target");
  }
  bdrag.ghost.setAttribute("transform",`translate(${p.x.toFixed(1)} ${p.y.toFixed(1)})`);
}
function bronzeUp(ev){
  const b=bdrag; bdrag=null;
  if(!b || !b.started) return;                       // tap: el click abre la ficha
  if(b.ghost) b.ghost.remove();
  if(bronzeSlotEl) bronzeSlotEl.classList.remove("target");
  const p=svgPointFixed(ev);
  const hit = Math.hypot(p.x-130, p.y-954) <= 34;    // soltó sobre el slot 🥉
  const code=TEAMS[b.teamIdx][0];
  if(hit) predictions["3P"]=code;
  else if(predictions["3P"]===code) delete predictions["3P"];  // arrastrar fuera = quitar
  prunePredictions(); savePredictions(); renderThird();
}
function bronzeCancel(){

  if(bronzeSlotEl) bronzeSlotEl.classList.remove("target");

}
function stageToSvg(pt){

  return {x:CX+dx*Math.cos(a)-dy*Math.sin(a), y:CY+dx*Math.sin(a)+dy*Math.cos(a)};
}

function pickPillMini(md){
  if(!md.pick) return "";
  const pts=md.pts;

  const t   = pts>=6?"+6⭐":pts>=4?"+4":pts>=3?"+3":"0";

}
function resultRow(key, a, b){
  const md=MATCHES[key];
  const fa=a!=null?TEAMS[a]:null, fb=b!=null?TEAMS[b]:null;
  const img=t=>t?`<img class="rf" src="${flagURL(t[0])}" data-c="${t[0]}" onerror="this.onerror=null;this.src=EMBEDDED[this.dataset.c]||''" alt="">`:"";
  const nA=fa?fa[1]:"—", nB=fb?fb[1]:"—";
  const ss = !md && simScores[key];
  let mid, note="";
  if(md){
    mid=`${md.score[0]}–${md.score[1]}`;
    if(md.pen) note=`${TEAMS[CODE2IDX[md.adv]][2]} por penales`;
    else if(md.aet) note="definido en el alargue";
  } else if(ss){
    mid=`${ss.score[0]}–${ss.score[1]}`;
    note="simulación";
  } else {
    mid="vs";
    note=SCHEDULE[key] || "por definir";

  const pill = md? pickPillMini(md) : "";
  let row=`<div class="rrow"><span class="rteam">${img(fa)}<span>${nA}</span></span><span class="rscore">${mid}</span><span class="rteam rt2"><span>${nB}</span>${img(fb)}</span>${pill}</div>`;
  if(note) row+=`<div class="rnote">${note}</div>`;

function render(){
  $flags.innerHTML="";
  $preds.innerHTML="";
  uprights=[];
  flagEls=[];
  for(let r=0;r<RINGS;r++) flagEls[r]=[];
  const labels=["Dieciseisavos","Octavos","Cuartos","Semis","Final","Campeón"];

  // anillo 0: las 32 banderas
  state[0].forEach((teamIdx,i)=>{
    const p=pos[0][i];
    const oppIdx = state[0][i%2===0 ? i+1 : i-1];
    const f=makeFlag(teamIdx, DIAM[0], TEAMS[oppIdx][2], labels[0]);
    f.wrap.setAttribute("transform",`translate(${p.x} ${p.y})`);
    $flags.appendChild(f.wrap);
    flagEls[0][i]=f;
    // entrada: arranca en el centro y florece hacia afuera
    if(!reduced){
      f.anim.setAttribute("transform",`translate(${CX-p.x} ${CY-p.y}) scale(.4)`);
      f.anim.style.transitionDelay=(i*18)+"ms";
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        f.anim.setAttribute("transform","translate(0 0) scale(1)");
      }));
      setTimeout(()=>{f.anim.style.transitionDelay="0ms";}, 1800+i*18);
    }
  });
  applyStage();
  renderThird();
}

// ---- AVANCE DE UN GANADOR ----
// ronda r, partido m, which (0|1) = cuál de los dos hijos gana
function advance(r,m,which,sim){
  const childIdx = 2*m+which;
  const teamIdx = state[r][childIdx];
  if(teamIdx==null) return;
  state[r+1][m]=teamIdx;

  const from=pos[r][childIdx], to=pos[r+1][m];
  const isChampRound = (r+1===RINGS-1);
  const labels=["Dieciseisavos","Octavos","Cuartos","Semis","Final","Campeón"];
  const f=makeFlag(teamIdx, DIAM[r+1], null, labels[r+1]);
  if(sim){
    f.wrap.classList.add("sim");
    const l=(r+m)%2;   // marcador simulado determinístico: 2-0 / 2-1
    simScores[`${r}-${m}`]={score: which===0? [2,l] : [l,2], adv:TEAMS[teamIdx][0]};
  }
  f.wrap.setAttribute("transform",`translate(${to.x} ${to.y})`);
  $flags.appendChild(f.wrap);
  flagEls[r+1][m]=f;

  // animación: arranca en la posición del hijo y se desliza a la del padre
  if(!reduced){
    f.anim.setAttribute("transform",`translate(${from.x-to.x} ${from.y-to.y})`);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      f.anim.setAttribute("transform","translate(0 0)");
    }));
  }
  applyStage();

  // atenuar al perdedor (excepto en la final: el subcampeón es podio, no eliminado)
  const loser=flagEls[r][2*m+(1-which)];
  if(loser && !isChampRound) loser.wrap.classList.add("dim");

  // si es el campeón, esconder el trofeo y resaltar
  if(isChampRound){
    const g=document.getElementById("champGlyph");
    if(g) g.style.display="none";
    // podio completo: copa reducida junto al campeón y plata al subcampeón
    const bd=el("text",{x:DIAM[5]*0.46,y:DIAM[5]*0.46,"font-size":"26","text-anchor":"middle","dominant-baseline":"central"},f.up); bd.textContent="🏆";
    if(loser){
      const sv=el("text",{x:DIAM[r]*0.46,y:-DIAM[r]*0.46,"font-size":"18","text-anchor":"middle","dominant-baseline":"central"},loser.up); sv.textContent="🥈";
    }
    setTimeout(()=>showInfo(`🏆 Campeón: ${TEAMS[teamIdx][2]}`),900);
  }
}

// ---- RESULTADOS REALES (fuente de verdad). Clave "ronda-partido" ----
// ronda 0 = octavos. score=[golesSlotA, golesSlotB] · adv=código que avanza · pen=true si por penales · stats opcional ([valSlotA,valSlotB])
const MATCHES = {
  "0-0": {score:[0,1], adv:"ca", pick:[0,1], pts:6},             // Sudáfrica 0-1 Canadá
  "0-1": {score:[1,1], adv:"ma", pen:true, pick:[1,1], pts:6},   // P.Bajos 1-1 Marruecos (pen)
  "0-2": {score:[1,1], adv:"py", pen:true, pick:[2,0], pts:0},   // Alemania 1-1 Paraguay (pen)
  "0-3": {score:[3,0], adv:"fr", pick:[3,1], pts:3},             // Francia 3-0 Suecia
  "0-4": {score:[2,1], adv:"pt", pick:[1,1], pts:0},             // Portugal 2-1 Croacia
  "0-5": {score:[3,0], adv:"es", pick:[2,0], pts:3},             // España 3-0 Austria
  "0-6": {score:[2,0], adv:"us", pick:[2,1], pts:3},             // USA 2-0 Bosnia
  "0-7": {score:[3,2], adv:"be", aet:true, pick:[1,1], pts:0},   // Bélgica 3-2 Senegal (alargue)
  "0-8": {score:[2,1], adv:"br", pick:[2,1], pts:6},             // Brasil 2-1 Japón
  "0-9": {score:[1,2], adv:"no", pick:[1,1], pts:0},             // C.Marfil 1-2 Noruega
  "0-10": {score:[2,0], adv:"mx", pick:[1,0], pts:3},            // México 2-0 Ecuador
  "0-11": {score:[2,1], adv:"gb-eng", pick:[1,0], pts:4},        // Inglaterra 2-1 Congo DR
  "0-12": {score:[3,2], adv:"ar", aet:true, pick:[2,0], pts:3},  // Argentina 3-2 Cabo Verde (alargue)
  "0-13": {score:[1,1], adv:"eg", pen:true, pick:[0,1], pts:0},  // Australia 1-1 Egipto (pen)
  "0-14": {score:[2,0], adv:"ch", pick:[2,1], pts:3},            // Suiza 2-0 Argelia
  "0-15": {score:[1,0], adv:"co", pick:[2,0], pts:3},            // Colombia 1-0 Ghana
  "1-0": {score:[0,3], adv:"ma", pick:[0,1], pts:3},             // Canadá 0-3 Marruecos
  "1-1": {score:[0,1], adv:"fr", pick:[0,2], pts:3},             // Paraguay 0-1 Francia
  "1-2": {score:[0,1], adv:"es", pick:[0,1], pts:6},             // Portugal 0-1 España ⭐
  "1-3": {score:[1,4], adv:"be", pick:[2,1], pts:0},             // USA 1-4 Bélgica
  "1-4": {score:[1,2], adv:"no", pick:[2,1], pts:0},             // Brasil 1-2 Noruega (UPSET)
  "1-5": {score:[2,3], adv:"gb-eng", pick:[1,1], pts:0},         // México 2-3 Inglaterra
  "1-6": {score:[3,2], adv:"ar", pick:[2,1], pts:4},             // Argentina 3-2 Egipto
  "1-7": {score:[0,0], adv:"ch", pen:true, pick:[1,2], pts:0},   // Suiza 0-0 Colombia (Suiza por penales)
  "2-0": {score:[0,2], adv:"fr", pick:[0,2], pts:6},               // Francia 2-0 Marruecos ⭐
  "2-1": {score:[2,1], adv:"es", pick:[2,1], pts:6},               // España 2-1 Bélgica ⭐
  "2-2": {score:[1,2], adv:"gb-eng", aet:true, pick:[2,1], pts:0}, // Noruega 1-2 Inglaterra (alargue)
  "2-3": {score:[3,1], adv:"ar", aet:true, pick:[1,0], pts:3},     // Argentina 3-1 Suiza (alargue)
  // --- Semifinales ---
  "3-0": {score:[0,2], adv:"es", pick:[2,1], pts:0}                // Francia 0-2 España (Oyarzabal, Pedro Porro) → ESPAÑA A LA FINAL
  // "3-1": Inglaterra vs Argentina (hoy 15/07) · "3P" 18/07 · "4-0" FINAL 19/07
  // "3-0": SF1 · "3-1": SF2 · "3P": 3er puesto (perdedores de semis, 18/07) · "4-0": FINAL 19/07
};
let demoTimers=[];
function applyRealResults(){
  const keys=Object.keys(MATCHES).sort((a,b)=>{
    const [ra,ma]=a.split("-").map(Number), [rb,mb]=b.split("-").map(Number);
    return ra-rb || ma-mb;
  });
  keys.forEach((key,k)=>{
    const [r,m]=key.split("-").map(Number);
    const adv=MATCHES[key].adv;
    demoTimers.push(setTimeout(()=>{
      if(state[r+1][m]!=null) return;                 // ya aplicado
      const which = state[r][2*m]===CODE2IDX[adv] ? 0 : 1;
      advance(r,m,which);
    }, 1400 + k*150));                                // tras la entrada, en oleadas solapadas
  });
}

// ---- SIMULAR EL RESTO (hipotético, desde el estado real actual) ----
function playDemo(){
  demoTimers.forEach(clearTimeout); demoTimers=[];
  simThird=null; simScores={};
  simActive=true; updateControls();
  let t=300;
  for(let r=0;r<RINGS-1;r++){
    const matches=pos[r].length/2;
    demoTimers.push(setTimeout(()=>{
      for(let m=0;m<matches;m++){
        if(state[r+1][m]==null && state[r][2*m]!=null && state[r][2*m+1]!=null){
          advance(r,m,(r+m)%2,true);
        }
      }
    }, t));
    if(r===3){  // tras resolverse las semis: los perdedores se deslizan al rincón
      demoTimers.push(setTimeout(()=>renderThird(true), t+950));
    }
    if(r===4 && !MATCHES["3P"]){  // tras la final: se decide el bronce simulado
      demoTimers.push(setTimeout(()=>{
        const L=semiLosers();
        if(L){ simThird=L[0]; simScores["3P"]={score:[2,1], adv:TEAMS[simThird][0]}; renderThird(); }
      }, t+950));
    }
    t += 1100;
  }
  demoTimers.push(setTimeout(renderPredictions, t+1600));
}
// ---- VOLVER AL ESTADO REAL ----
const REAL_DONE = 1400 + Object.keys(MATCHES).length*150 + 1700;
function resetBracket(){
  demoTimers.forEach(clearTimeout); demoTimers=[];
  simThird=null; simScores={};
  simActive=false; updateControls();
  state=freshState();
  const g=document.getElementById("champGlyph");
  if(g) g.style.display="";
  render();
  applyRealResults();
  demoTimers.push(setTimeout(loadPredictions, REAL_DONE));
}

// ============ PREDICCIONES TEMPORALES (no tocan la verdad) ============
// Guardado con triple fallback: window.storage (artefacto) → localStorage (hosting) → memoria.
const store={
  _m:{},
  async get(k){
    try{ if(window.storage){ const r=await window.storage.get(k); return r? r.value : null; } }catch(e){}
    try{ return localStorage.getItem(k); }catch(e){}
    return store._m[k] ?? null;
  },
  async set(k,v){
    try{ if(window.storage){ await window.storage.set(k,v); return; } }catch(e){}
    try{ localStorage.setItem(k,v); return; }catch(e){}
    store._m[k]=v;
  }
};
let predictions={};                 // clave "ronda-partido" → código del equipo predicho
let slotEls=[];
const PRED_KEY="wc26-pred";
let simActive=false;
function updateControls(){
  // acciones contextuales: solo se muestran cuando tienen algo que hacer
  const c=document.getElementById("clearpred");
  if(c) c.style.display = Object.keys(predictions).length ? "" : "none";
  const r=document.getElementById("reset");
  if(r) r.style.display = simActive ? "" : "none";
}
function savePredictions(){ store.set(PRED_KEY, JSON.stringify(predictions)); }
async function loadPredictions(){
  try{ const v=await store.get(PRED_KEY); predictions = v? (JSON.parse(v)||{}) : {}; }
  catch(e){ predictions={}; }
  renderPredictions();
}

// Ocupante EFECTIVO de un nodo: la realidad manda; si no hay, la predicción válida.
function effAt(r,i){
  if(state[r][i]!=null) return {idx:state[r][i], pred:false};
  if(r>0){
    const code=predictions[`${r-1}-${i}`];
    if(code!=null && CODE2IDX[code]!=null){
      const ti=CODE2IDX[code];
      const a=effAt(r-1,2*i), b=effAt(r-1,2*i+1);
      if((a&&a.idx===ti)||(b&&b.idx===ti)) return {idx:ti, pred:true};
    }
  }
  return null;
}
// Poda: borra predicciones ya resueltas por la realidad o que quedaron inválidas.
function prunePredictions(){
  let changed=true;
  while(changed){
    changed=false;
    for(const key in predictions){
      if(key==="3P"){
        const ti=CODE2IDX[predictions[key]];
        const L=semiLosers();
        if(MATCHES["3P"] || !L || (L[0]!==ti && L[1]!==ti)){ delete predictions[key]; changed=true; }
        continue;
      }
      const [r,m]=key.split("-").map(Number);
      if(MATCHES[key] || state[r+1][m]!=null){ delete predictions[key]; changed=true; continue; }
      const ti=CODE2IDX[predictions[key]];
      const a=effAt(r,2*m), b=effAt(r,2*m+1);
      if(!((a&&a.idx===ti)||(b&&b.idx===ti))){ delete predictions[key]; changed=true; }
    }
  }
}
function renderPredictions(){
  prunePredictions();
  $preds.innerHTML="";
  uprights=uprights.filter(u=>u.isConnected);   // soltar nodos ya removidos
  for(let r=1;r<RINGS;r++){
    for(let i=0;i<pos[r].length;i++){
      if(state[r][i]!=null) continue;
      const e=effAt(r,i);
      if(!e || !e.pred) continue;
      const p=pos[r][i];
      const f=makeFlag(e.idx, DIAM[r], null, null);
      f.wrap.classList.add("pred");
      f.wrap.setAttribute("transform",`translate(${p.x} ${p.y})`);
      $preds.appendChild(f.wrap);
    }
  }
  // trofeo: ocultarlo si hay campeón PREDICHO (si hay campeón real ya lo maneja advance)
  const g=document.getElementById("champGlyph");
  if(g && state[RINGS-1][0]==null){
    g.style.display = (effAt(RINGS-1,0)? "none" : "");
  }
  renderThird();
  applyStage();
  updateControls();
}

// Pointer → coordenadas del stage (deshace rotación y zoom)
function toStage(ev){
  const rct=$svg.getBoundingClientRect();
  let x=(ev.clientX-rct.left)/rct.width*1000 - CX;
  let y=(ev.clientY-rct.top)/rct.height*1000 - CY;
  const a=-rot*Math.PI/180;
  const rx=(x*Math.cos(a)-y*Math.sin(a))/zoom;
  const ry=(x*Math.sin(a)+y*Math.cos(a))/zoom;
  return {x:rx+CX, y:ry+CY};
}
function makeGhost(teamIdx,diam,parent){
  const t=TEAMS[teamIdx], g=el("g",{class:"ghost"},parent||$stage);
  const r=diam/2;
  el("circle",{r:r,fill:"var(--bg-flag)"},g);
  const img=el("image",{x:-r,y:-r,width:diam,height:diam},g);
  setFlag(img,t[0]);
  el("circle",{r:r,fill:"none",stroke:"var(--gold)","stroke-width":2,"stroke-dasharray":"4 4"},g);
  return g;
}
// ---- DRAG DE PREDICCIÓN ----
let fdrag=null;
function flagPointerDown(ev,teamIdx){
  // posición efectiva más profunda del equipo
  let dr=-1, di=-1;
  for(let r=0;r<RINGS;r++){
    for(let i=0;i<pos[r].length;i++){
      const e=effAt(r,i);
      if(e && e.idx===teamIdx && r>dr){ dr=r; di=i; }
    }
  }
  ev.stopPropagation();
  cancelAnimationFrame(rotAnim);
  moved=false;
  let canDrag = (dr>=0 && dr<RINGS-1);
  let tr=-1, tm=-1;
  if(canDrag){
    tm=Math.floor(di/2); tr=dr+1;
    if(state[tr][tm]!=null) canDrag=false;         // eliminado o cruce ya resuelto: solo tap
  }
  const e=dr>=0? effAt(dr,di) : null;
  fdrag={teamIdx, dr, di, tr, tm, canDrag, wasPred: !!(e&&e.pred), started:false, aborted:false, ghost:null};
}
function flagMove(ev){
  const p=toStage(ev);
  if(!fdrag.canDrag){
    const o=pos[fdrag.dr] && pos[fdrag.dr][fdrag.di];
    if(o && Math.hypot(p.x-o.x, p.y-o.y) > 12) fdrag.aborted=true;   // se movió mucho: no es tap
    return;
  }
  if(!fdrag.started){
    const o=pos[fdrag.dr][fdrag.di];
    if(Math.hypot(p.x-o.x, p.y-o.y) < 8) return;   // umbral: aún es tap
    fdrag.started=true; moved=true;
    try{ $svg.setPointerCapture(ev.pointerId); }catch(e){}
    fdrag.ghost=makeGhost(fdrag.teamIdx, DIAM[fdrag.tr]);
    if(slotEls[fdrag.tr] && slotEls[fdrag.tr][fdrag.tm]) slotEls[fdrag.tr][fdrag.tm].classList.add("target");
  }
  fdrag.ghost.setAttribute("transform",`translate(${p.x} ${p.y}) rotate(${-rot})`);
}
function flagUp(ev){
  const f=fdrag; fdrag=null;
  if(!f || !f.started){                            // fue tap: abrir ficha directo
    if(f && !f.aborted){ moved=true; openCard(f.teamIdx); }
    return;
  }
  if(f.ghost) f.ghost.remove();
  if(slotEls[f.tr] && slotEls[f.tr][f.tm]) slotEls[f.tr][f.tm].classList.remove("target");
  const p=toStage(ev), tgt=pos[f.tr][f.tm];
  const hit = Math.hypot(p.x-tgt.x, p.y-tgt.y) <= DIAM[f.tr]/2 + 30;
  if(hit){
    predictions[`${f.dr}-${f.tm}`]=TEAMS[f.teamIdx][0];        // predecir ganador
  } else if(f.wasPred){
    delete predictions[`${f.dr-1}-${f.di}`];                   // sacar una predicción arrastrándola fuera
  }
  prunePredictions(); savePredictions(); renderPredictions();
}
function flagCancel(){
  if(!fdrag) return;
  if(fdrag.ghost) fdrag.ghost.remove();
  if(slotEls[fdrag.tr] && slotEls[fdrag.tr][fdrag.tm]) slotEls[fdrag.tr][fdrag.tm].classList.remove("target");
  fdrag=null;
}

// ---- ROTAR + ZOOM (girar la rueda, banderas siempre derechas) ----
let rot=0, zoom=1, dragging=false, lastAng=0, moved=false;
function pointerAngle(ev){
  const r=$svg.getBoundingClientRect();
  const vx=(ev.clientX-r.left)/r.width*1000;
  const vy=(ev.clientY-r.top)/r.height*1000;
  return Math.atan2(vy-CY,vx-CX)*180/Math.PI;
}
let rotAnim=null;
function rotateTo(target){
  // gira la rueda por el camino corto hasta dejar el objetivo arriba
  if(reduced){ rot=target; applyStage(); return; }
  cancelAnimationFrame(rotAnim);
  const start=rot;
  const d=((target-start)%360+540)%360-180;
  const t0=performance.now(), dur=650;
  const step=now=>{
    const k=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-k,3);
    rot=start+d*e; applyStage();
    if(k<1) rotAnim=requestAnimationFrame(step);
  };
  rotAnim=requestAnimationFrame(step);
}
let stageRAF=0;
function applyStage(){
  // coalesce: muchas llamadas por segundo → una aplicación por frame
  if(stageRAF) return;
  stageRAF=requestAnimationFrame(()=>{ stageRAF=0; applyStageNow(); });
}
function applyStageNow(){
  $stage.setAttribute("transform",
    `translate(${CX} ${CY}) rotate(${rot}) scale(${zoom}) translate(${-CX} ${-CY})`);
  // contra-rotar banderas para que no se inclinen
  uprights.forEach(u=>u.setAttribute("transform",`rotate(${-rot})`));
  // mantener el trofeo del centro siempre derecho
  const g=document.getElementById("champGlyph");
  if(g) g.setAttribute("transform",`rotate(${-rot} ${CX} ${CY})`);
}
$svg.addEventListener("pointerdown",ev=>{
  cancelAnimationFrame(rotAnim);
  dragging=true; moved=false; lastAng=pointerAngle(ev);
  $svg.classList.add("dragging"); $svg.setPointerCapture(ev.pointerId);
});
$svg.addEventListener("pointermove",ev=>{
  if(bdrag){ bronzeMove(ev); return; }
  if(fdrag){ flagMove(ev); return; }
  if(!dragging) return;
  const a=pointerAngle(ev);
  let d=a-lastAng;
  if(d>180) d-=360; if(d<-180) d+=360;
  if(Math.abs(d)>0.4) moved=true;
  rot+=d; lastAng=a; applyStage();
});
function endDrag(){ dragging=false; $svg.classList.remove("dragging"); }
$svg.addEventListener("pointerup",ev=>{ if(bdrag){ bronzeUp(ev); return; } if(fdrag){ flagUp(ev); return; } endDrag(); });
$svg.addEventListener("pointercancel",()=>{ if(bdrag){ bronzeCancel(); return; } if(fdrag){ flagCancel(); return; } endDrag(); });
$svg.addEventListener("wheel",ev=>{
  ev.preventDefault();
  zoom*= (ev.deltaY<0?1.12:0.89);
  zoom=Math.max(0.6,Math.min(3,zoom));
  applyStage();
},{passive:false});

// ---- INIT ----
document.getElementById("play").addEventListener("click",playDemo);
document.getElementById("reset").addEventListener("click",resetBracket);
document.getElementById("clearpred").addEventListener("click",()=>{
  predictions={}; savePredictions(); renderPredictions();
  showInfo("Predicciones borradas ✓");
});
document.getElementById("results").addEventListener("click",openResults);
function setTheme(dark){
  document.body.classList.toggle("dark",dark);
  const b=document.getElementById("theme");
  if(b) b.textContent = dark? "☀️ Claro" : "🌙 Oscuro";
}
document.getElementById("theme").addEventListener("click",()=>{
  const d=!document.body.classList.contains("dark");
  setTheme(d);
  store.set("wc26-theme", d? "dark":"light");
});
(async()=>{ try{ const v=await store.get("wc26-theme"); if(v==="dark") setTheme(true); }catch(e){} })();
drawLines();
drawSlots();
drawRingLabels();
state=freshState();
render();
applyRealResults();
setTimeout(loadPredictions, REAL_DONE);
</script>
